appId: com.today.diary  # TODO: 실제 앱 패키지명(app.json의 android.package)으로 수정해주세요!
---
# ==========================================
# 🍎 E2E 핵심 시나리오: 완벽한 하루 기록하기
# - 앱 실행부터 일기 작성, 저장, 피드 조회까지 테스트
# ==========================================

# 1. 앱 처음부터 깨끗하게 시작 (테스트를 위해 기존 데이터를 클리어할 수도 있음)
- clearState  # 앱 데이터를 초기화하고 시작하려면 사용 (선택 사항)
- launchApp

# 2. 메인 페이지 > '새 일기 쓰기' 버튼 클릭
- tapOn:
    id: "add-diary-button" # 태그가 없으면 텍스트로 인식 가능 (예: "새 일기 쓰기")

# 3. '오늘의 기분' 모달에서 선택
- tapOn: "행복해요"
- tapOn: "선택 완료"

# 4. 작성(Write) 화면: 기본 텍스트 입력
- tapOn: "무엇을 하셨나요?" # 플레이스홀더 텍스트나 고유 id 찾기
- inputText: "Maestro 자동화 테스트로 일기를 쓰고 있어요! 야호!"
- hideKeyboard

# 5. 스티커 부착 (스티커 서랍 이용)
- tapOn: "스티커 서랍 열기" 
- tapOn: "🍔" # 이모지 스티커 클릭 예시
- tapOn: "빈 캔버스 영역" # 스티커 창 닫기 또는 배경 터치

# 6. 상단 '저장' 버튼 터치
- tapOn: "저장"

# 7. 피드 리스트(Summary 또는 DiaryFeed)로 복귀해서 잘 쓰였는지 검증
- assertVisible: "Maestro 자동화 테스트로 일기를 쓰고 있어요! 야호!"
- assertVisible: "행복해요" 
